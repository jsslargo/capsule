version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/reference/python"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(python)"

  - package-ecosystem: "npm"
    directory: "/reference/typescript"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "typescript"
    commit-message:
      prefix: "deps(typescript)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
